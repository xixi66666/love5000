<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 我们的恋爱记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            animation: float-up linear infinite;
            font-size: 20px;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .question-box {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 20px;
            padding: 25px;
            margin: 30px 0;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .question-box:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .question-label {
            color: #667eea;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
        }

        .question-text {
            color: #555;
            font-size: 1.3rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }

        input[type="text"]::placeholder {
            color: #bbb;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .error-message {
            color: #ff4757;
            margin-top: 15px;
            font-size: 0.95rem;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-message.show {
            opacity: 1;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            color: #2ed573;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
        }

        .hint {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 20px;
            font-style: italic;
        }

        .love-quote {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9rem;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2rem;
            }

            .question-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>

<div class="login-container">
    <div class="lock-icon">💕</div>
    <h1>Welcome</h1>
    <p class="subtitle">I LOVE YOU SO MUCH</p>

    <form id="loginForm">
        <div class="question-box">
            <label class="question-label">💝 验证问题</label>
            <p class="question-text">你爱我不!!!</p>
            <input
                    type="text"
                    id="answerInput"
                    placeholder="请输入答案..."
                    autocomplete="off"
                    required
            >
        </div>

        <button type="submit" class="submit-btn">
            进入 💖
        </button>

        <div class="error-message" id="errorMessage">
            答案不对哦，再想想~ 💭
        </div>

        <div class="success-message" id="successMessage">
            回答正确！正在跳转... ✨
        </div>
    </form>

    <p class="hint">提示：五个字！</p>

    <div class="love-quote">
        "Love is not about how many days, months, or years you have been together. Love is about how much you love each other every single day."
    </div>
</div>

<script>
    const CORRECT_ANSWER = '我爱你的很';

    function createFloatingHearts() {
        const container = document.getElementById('heartsBg');
        const hearts = ['💕', '💖', '💗', '💘', '💝'];

        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            container.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);
        }, 800);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const answer = document.getElementById('answerInput').value.trim().toLowerCase();
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const submitBtn = document.querySelector('.submit-btn');

        if (answer === CORRECT_ANSWER) {
            errorMsg.classList.remove('show');
            successMsg.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.textContent = '验证成功 ✨';

            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('loginTime', new Date().toISOString());

            setTimeout(() => {
                window.location.href = '/index.html';
            }, 1500);
        } else {
            errorMsg.classList.add('show');
            successMsg.style.display = 'none';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();

            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 3000);
        }
    });

    document.getElementById('answerInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });

    createFloatingHearts();

    document.getElementById('answerInput').focus();
</script>
</body>
</html>
