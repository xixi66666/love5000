<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝宝来玩情侣井字棋！</title>
  <style>
    :root {
      --primary-color: #ff6b81;
      --bg-color: #fff0f5;
      --card-bg: #ffffff;
      --text-color: #555555;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans SC', sans-serif; }
    body {
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: var(--text-color);
    }
    .game-title {
      font-size: 2rem;
      color: var(--primary-color);
      margin-bottom: 20px;
      text-align: center;
    }
    .status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: var(--primary-color);
      font-weight: 700;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: white;
      border: 2px solid var(--primary-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255,107,129,0.1);
    }
    .reset-btn, .back-btn {
      margin-top: 20px;
      padding: 10px 25px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      margin: 20px 5px 0;
    }
  </style>
</head>
<body>
<h1 class="game-title">💘⭐ 情侣井字棋</h1>
<div class="status" id="status">爱心玩家先手</div>
<div class="board" id="board"></div>
<button class="reset-btn" onclick="resetGame()">重新开始</button>
<button class="back-btn" onclick="window.close()">返回主页</button>

<script>
  const board = document.getElementById('board');
  const status = document.getElementById('status');
  const cells = Array(9).fill(null);
  let currentPlayer = '💘';
  const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  // 初始化棋盘
  function initBoard() {
    board.innerHTML = '';
    cells.forEach((_, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.addEventListener('click', handleClick);
      board.appendChild(cell);
    });
  }

  function handleClick(e) {
    const index = e.target.dataset.index;
    if(cells[index] || checkWinner()) return;

    cells[index] = currentPlayer;
    e.target.textContent = currentPlayer;

    if(checkWinner()) {
      status.textContent = `${currentPlayer} 赢啦！`;
      return;
    }
    if(!cells.includes(null)) {
      status.textContent = `平局！`;
      return;
    }
    currentPlayer = currentPlayer === '💘' ? '⭐' : '💘';
    status.textContent = `${currentPlayer} 回合`;
  }

  function checkWinner() {
    return winPatterns.some(pattern => {
      const [a,b,c] = pattern;
      return cells[a] && cells[a] === cells[b] && cells[a] === cells[c];
    });
  }

  function resetGame() {
    cells.fill(null);
    currentPlayer = '💘';
    status.textContent = '爱心玩家先手';
    initBoard();
  }

  initBoard();
</script>
</body>
</html>
