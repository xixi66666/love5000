server:
  port: 8082
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict

spring:
  application:
    name: imagetemplate
  web:
    resources:
      static-locations:
        - classpath:/static/

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://nimabo.cn/v1}
  image-model: ${OPENAI_IMAGE_MODEL:gpt-image-2}
  connect-timeout-ms: ${OPENAI_CONNECT_TIMEOUT_MS:300000}
  read-timeout-ms: ${OPENAI_READ_TIMEOUT_MS:1800000}
  proxy:
    type: ${OPENAI_PROXY_TYPE:HTTP}
    host: ${OPENAI_PROXY_HOST:}
    port: ${OPENAI_PROXY_PORT:0}
