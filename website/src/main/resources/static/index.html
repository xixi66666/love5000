<!DOCTYPE html>
<html lang="zh-CN">

<head>

<body>

        <source src="media/moon-wallpaper.mp4" type="video/mp4">
    </video>
    <div class="moon-glow"></div>
    <div class="hero-vignette"></div>
    <div class="hero-grain"></div>
    <div class="hero-scanline"></div>
</div>

<header class="site-header">
    <a class="brand" href="#home" aria-label="返回首页">
        <span class="brand-mark"></span>
        <span>
            <strong>XiXixiaozi</strong>
        </span>
    </a>
    <nav class="nav-links" id="main-nav" aria-label="主导航">
        <a href="#home">首页</a>
        <a href="http://localhost:8081/login.html" target="_blank" rel="noopener">xixi & 5000</a>
        <a href="http://localhost:8082/index.html" target="_blank" rel="noopener" data-auth-required="true" data-auth-target-name="图片模板">Photo</a>
        <a href="blog/index.html">Blog</a>
        <a href="http://127.0.0.1:5174/" target="_blank" rel="noopener">股票分析台</a>
        <a href="http://127.0.0.1:5175/" target="_blank" rel="noopener">Quant</a>
        <a href="http://127.0.0.1:5176/" target="_blank" rel="noopener">视频工作台</a>
        <a class="auth-login-button" href="javascript:void(0)">Login</a>
        <a class="auth-register-button" href="javascript:void(0)">Register</a>
        <a class="auth-logout-button" href="javascript:void(0)" style="display: none;">Logout</a>
    </nav>
</header>

<main>
    <section class="hero" id="home" aria-labelledby="hero-title">
        <div class="hero-copy">
            <h1 id="hero-title">西西小屋</h1>
            <p class="hero-statement">我需要，最狂的风，和最静的海。</p>
            <nav class="service-grid" aria-label="微服务入口">
                <a class="service-card service-card-love" href="http://localhost:8081/login.html" target="_blank" rel="noopener" data-health-url="http://localhost:8081/login.html" data-health-mode="no-cors">
                    <strong>xixi & 5000 · 8081</strong>
                    <span class="service-status" aria-label="检测中" title="检测中"></span>
                </a>
                <a class="service-card service-card-image" href="http://localhost:8082/index.html" target="_blank" rel="noopener" data-auth-required="true" data-auth-target-name="图片模板" data-health-url="http://localhost:8082/index.html" data-health-mode="no-cors">
                    <strong>Photo · 8082</strong>
                    <span class="service-status" aria-label="检测中" title="检测中"></span>
                </a>
                <a class="service-card service-card-blog" href="blog/index.html" data-health-url="/blog/index.html">
                    <strong>Blog · 8080</strong>
                    <span class="service-status" aria-label="检测中" title="检测中"></span>
                </a>
                <a class="service-card service-card-stock" href="http://127.0.0.1:5174/" target="_blank" rel="noopener" data-health-url="http://127.0.0.1:5174/api/health" data-health-mode="no-cors">
                    <strong>股票分析台 · 5174</strong>
                    <span class="service-status" aria-label="检测中" title="检测中"></span>
                </a>
                <a class="service-card service-card-quant" href="http://127.0.0.1:5175/" target="_blank" rel="noopener" data-health-url="http://127.0.0.1:5175/api/health" data-health-mode="no-cors">
                    <strong>Quant 研究台 · 5175</strong>
                    <span class="service-status" aria-label="检测中" title="检测中"></span>
                </a>
                <a class="service-card service-card-video" href="http://127.0.0.1:5176/" target="_blank" rel="noopener" data-health-url="http://127.0.0.1:5176/api/health" data-health-mode="no-cors">

                    <span class="service-status" aria-label="检测中" title="检测中"></span>
                </a>
            </nav>
        </div>

    </section>
</main>

<footer class="site-footer">
    <a href="https://github.com/xixi66666/love5000" target="_blank" rel="noopener">SourceCode</a>
</footer>

<div class="auth-pop-up">
    <form class="auth-pop-up-main">
        <button class="auth-pop-up-close" type="button" aria-label="关闭登录窗口">×</button>
        <div class="auth-pop-up-title">Login</div>
        <p class="auth-pop-up-copy">登录后可以访问受保护项目，并保持当前工作区连接。</p>
        <label>
            <span>用户名</span>
            <input class="auth-username" name="username" autocomplete="username" required>
        </label>
        <label class="auth-display-name-wrap" style="display: none;">
            <span>显示名称</span>
            <input class="auth-display-name" name="displayName" autocomplete="nickname">
        </label>
        <label>
            <span>密码</span>
            <input class="auth-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="auth-message" aria-live="polite"></div>
        <button class="auth-submit-button" type="submit">Continue</button>
    </form>
</div>

<script src="js/script.js?v=5.8"></script>
</body>

</html>
