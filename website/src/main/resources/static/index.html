<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>西西小屋</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="img/moon-icon.png?v=5.5">
    <link rel="shortcut icon" href="favicon.ico?v=5.5">
    <meta name="description" content="西西小子的个人微服务静夜入口，连接博客、恋爱相册、AI 图片模板和 A 股 AI 研究台。">
    <meta name="keywords" content="Spring Boot, AI, Blog, Microservice">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css?v=5.5">
</head>

<body>
<a class="skip-link" href="#main-nav">跳到微服务入口</a>

<div class="cinematic-bg moon-bg" aria-hidden="true">
    <video class="hero-video" autoplay muted loop playsinline poster="media/moon-wallpaper-poster.jpg">
        <source src="media/moon-wallpaper.mp4" type="video/mp4">
    </video>
    <div class="moon-glow"></div>
    <div class="hero-vignette"></div>
    <div class="hero-grain"></div>
    <div class="hero-scanline"></div>
</div>

<header class="site-header">
    <a class="brand" href="#home" aria-label="返回首页">
        <span class="brand-mark"></span>
        <span>
            <strong>XiXixiaozi</strong>
        </span>
    </a>
    <nav class="nav-links" id="main-nav" aria-label="主导航">
        <a href="#home">首页</a>
        <a href="http://localhost:8081/login.html" target="_blank" rel="noopener">5000</a>
        <a href="http://localhost:8082/index.html" target="_blank" rel="noopener" data-auth-required="true" data-auth-target-name="Image Prompt Templates">Photo</a>
        <a href="blog/index.html">技术日志</a>
        <a href="http://127.0.0.1:5174/" target="_blank" rel="noopener">A 股研究台</a>
        <a class="auth-login-button" href="javascript:void(0)">Login</a>
        <a class="auth-register-button" href="javascript:void(0)">Register</a>
        <a class="auth-logout-button" href="javascript:void(0)" style="display: none;">Logout</a>
    </nav>
</header>

<main>
    <section class="hero" id="home" aria-labelledby="hero-title">
        <div class="hero-copy">
            <h1 id="hero-title">西西小屋</h1>
            <p class="hero-statement">我需要，最狂的风，和最静的海。</p>
            <nav class="service-stack" aria-label="微服务入口">
                <a href="http://localhost:8081/login.html" target="_blank" rel="noopener">恋爱相册</a>
                <a href="http://localhost:8082/index.html" target="_blank" rel="noopener" data-auth-required="true" data-auth-target-name="图片模板">图片模板</a>
                <a href="blog/index.html">技术日志</a>
                <a href="http://127.0.0.1:5174/" target="_blank" rel="noopener">A 股研究台</a>
            </nav>
            <aside class="mission-panel" aria-label="系统状态">
                <div class="panel-header">
                    <span>静夜遥测</span>
                    <strong>在线</strong>
                </div>
                <div class="telemetry-grid">
                    <div>
                        <span>服务</span>
                        <strong>04</strong>
                    </div>
                    <div>
                        <span>主页</span>
                        <strong>8080</strong>
                    </div>
                    <div>
                        <span>研究台</span>
                        <strong>5174</strong>
                    </div>
                    <div>
                        <span>鉴权</span>
                        <strong>READY</strong>
                    </div>
                </div>
                <p class="mission-note">各处入口轻声守候，需要时再被点亮。</p>
            </aside>
        </div>

    </section>
</main>

<footer class="site-footer">
    <a href="https://github.com/xixi66666/love5000" target="_blank" rel="noopener">SourceCode</a>
</footer>

<div class="auth-pop-up">
    <form class="auth-pop-up-main">
        <button class="auth-pop-up-close" type="button" aria-label="关闭登录窗口">×</button>
        <div class="auth-pop-up-title">Login</div>
        <p class="auth-pop-up-copy">登录后可以访问受保护项目，并保持当前工作区连接。</p>
        <label>
            <span>用户名</span>
            <input class="auth-username" name="username" autocomplete="username" required>
        </label>
        <label class="auth-display-name-wrap" style="display: none;">
            <span>显示名称</span>
            <input class="auth-display-name" name="displayName" autocomplete="nickname">
        </label>
        <label>
            <span>密码</span>
            <input class="auth-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="auth-message" aria-live="polite"></div>
        <button class="auth-submit-button" type="submit">Continue</button>
    </form>
</div>

<script src="js/script.js?v=5.5"></script>
</body>

</html>
