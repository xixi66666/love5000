<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Library</title>
    <link rel="stylesheet" href="prompt-console.css">
</head>

<body>
<a class="skip-link" href="#library">跳到提示词合集</a>

<header class="library-header">
    <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">✦</span>
        <span>
            <strong>Prompt Library</strong>
            <small>授权提示词合集</small>
        </span>
    </a>
    <nav class="top-actions" aria-label="页面导航">
        <a href="/">主页</a>
        <a href="#categories">分类</a>
        <a href="#sources">来源</a>
    </nav>
</header>

<main class="library-shell" id="library">
    <section class="hero-panel" aria-labelledby="page-title">
        <div>
            <p class="eyebrow">Curated Prompt Archive</p>
            <h1 id="page-title">提示词合集</h1>
            <p class="hero-copy">V1.0 单纯的提示词整理合集</p>
        </div>
        <div class="hero-stats" aria-live="polite">
            <strong class="entry-count">0</strong>
            <span>条提示词</span>
        </div>
    </section>

    <section class="toolbar-panel" aria-label="搜索和筛选">
        <label class="search-field">
            <span>搜索提示词</span>
            <input class="search-input" type="search" placeholder="搜索标题、分类、标签或提示词正文">
        </label>
        <label class="filter-field">
            <span>来源</span>
            <select class="source-filter"></select>
        </label>
        <label class="filter-field">
            <span>大分类</span>
            <select class="group-filter"></select>
        </label>
        <label class="filter-field">
            <span>小分类</span>
            <select class="category-filter"></select>
        </label>
        <label class="filter-field">
            <span>状态</span>
            <select class="status-filter">
                <option value="all">全部</option>
                <option value="imported">已导入</option>
                <option value="pending">待导入</option>
            </select>
        </label>
    </section>

    <section class="category-panel" id="categories" aria-labelledby="category-title">
        <div class="panel-heading">
            <div>
                <p class="panel-kicker">Categories</p>
                <h2 id="category-title">全部分类</h2>
            </div>
            <span class="category-count">0</span>
        </div>
        <div class="category-list"></div>
    </section>

    <section class="library-layout">
        <aside class="source-panel" id="sources" aria-labelledby="source-title">
            <div class="panel-heading">
                <div>
                    <p class="panel-kicker">Sources</p>
                    <h2 id="source-title">授权来源</h2>
                </div>
                <span class="source-count">0</span>
            </div>
            <div class="source-list"></div>
        </aside>

        <section class="entry-panel" aria-labelledby="entry-title">
            <div class="panel-heading">
                <div>
                    <p class="panel-kicker">Collection</p>
                    <h2 id="entry-title">提示词卡片</h2>
                </div>
                <span class="visible-count">0</span>
            </div>
            <div class="entry-list" aria-live="polite"></div>
        </section>
    </section>
</main>

<dialog class="entry-dialog">
    <article class="dialog-card">
        <div class="dialog-head">
            <div>
                <p class="dialog-source"></p>
                <h2 class="dialog-title"></h2>
            </div>
            <button class="dialog-close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="tag-row dialog-tags"></div>
        <pre class="dialog-prompt"></pre>
        <div class="dialog-actions">
            <button class="copy-dialog-button" type="button">复制提示词</button>
            <a class="dialog-link" href="#" target="_blank" rel="noopener">打开来源</a>
        </div>
        <p class="dialog-license"></p>
    </article>
</dialog>

<script src="prompt-category-groups.js"></script>
<script src="prompt-console.js"></script>
</body>

</html>
