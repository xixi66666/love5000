<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Caleb</title>
    <meta name="description" content="Caleb 的个人博客微应用">
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="blog.css">
</head>
<body>
<div class="blog-shell">
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="Back to home">
            <img src="../img/avatar.png" alt="Caleb avatar">
            <span>Caleb Blog</span>
        </a>
        <nav class="top-nav" aria-label="Blog navigation">
            <a href="#home">首页</a>
            <a href="#archive">归档</a>
            <a href="#about">关于</a>
            <button id="writeButton" type="button">写文章</button>
            <button id="loginButton" type="button">登录</button>
            <button id="registerButton" type="button">注册</button>
            <button id="logoutButton" type="button" hidden>退出</button>
            <button id="themeToggle" type="button" aria-label="Toggle theme">夜间</button>
        </nav>
    </header>

    <section class="hero" id="home">
        <div class="hero-copy">
            <p class="eyebrow">Tinker & Share</p>
            <h1>记录开发、折腾和长期学习。</h1>
            <p>一个面向个人知识沉淀的博客微应用，适合写技术教程、年度总结、软件分享和项目复盘。</p>
        </div>
        <div class="hero-panel" aria-label="Blog stats">
            <span>文章</span>
            <strong id="postCount">0</strong>
            <span>分类</span>
            <strong id="categoryCount">0</strong>
        </div>
    </section>

    <main class="layout">
        <aside class="sidebar" aria-label="Blog sidebar">
            <section class="profile-card">
                <img src="../img/avatar.png" alt="Caleb">
                <h2>Caleb XXY</h2>
                <p>Full Stack Developer. 写代码，做网站，记录实践过程。</p>
            </section>

            <section class="side-section">
                <h2>搜索</h2>
                <input id="searchInput" type="search" placeholder="搜索标题、摘要或标签">
            </section>

            <section class="side-section">
                <h2>分类</h2>
                <div id="categoryList" class="chip-list"></div>
            </section>

            <section class="side-section">
                <h2>标签</h2>
                <div id="tagList" class="chip-list tag-list"></div>
            </section>
        </aside>

        <section class="content">
            <div class="content-toolbar">
                <div>
                    <p class="eyebrow">Latest Posts</p>
                    <h2 id="listTitle">最新文章</h2>
                </div>
                <button id="resetFilters" type="button">全部文章</button>
            </div>

            <div id="postList" class="post-list"></div>
            <article id="postDetail" class="post-detail" hidden></article>
            <section id="archivePanel" class="archive-panel" hidden></section>
        </section>
    </main>
</div>

<div id="authModal" class="modal" hidden>
    <form id="authForm" class="modal-panel">
        <button class="modal-close" type="button" data-close-modal aria-label="Close">x</button>
        <p class="eyebrow" id="authModeLabel">Login</p>
        <h2 id="authTitle">登录</h2>
        <label>
            用户名
            <input id="authUsername" name="username" autocomplete="username" required>
        </label>
        <label id="displayNameRow" hidden>
            昵称
            <input id="authDisplayName" name="displayName" autocomplete="nickname">
        </label>
        <label>
            密码
            <input id="authPassword" name="password" type="password" autocomplete="current-password" required>
        </label>
        <p id="authMessage" class="form-message"></p>
        <button class="primary-button" type="submit">提交</button>
    </form>
</div>

<div id="editorModal" class="modal" hidden>
    <form id="articleForm" class="modal-panel editor-panel">
        <button class="modal-close" type="button" data-close-modal aria-label="Close">x</button>
        <p class="eyebrow">New Post</p>
        <h2>新增文章</h2>
        <label>
            标题
            <input id="articleTitle" name="title" maxlength="160" required>
        </label>
        <label>
            Slug
            <input id="articleSlug" name="slug" placeholder="可留空自动生成">
        </label>
        <label>
            摘要
            <textarea id="articleSummary" name="summary" rows="3" maxlength="500" required></textarea>
        </label>
        <label>
            分类
            <input id="articleCategory" name="category" required>
        </label>
        <label>
            标签
            <input id="articleTags" name="tags" placeholder="用英文逗号分隔">
        </label>
        <label>
            正文 HTML
            <textarea id="articleContent" name="contentHtml" rows="10" required></textarea>
        </label>
        <p id="articleMessage" class="form-message"></p>
        <button class="primary-button" type="submit">发布</button>
    </form>
</div>

<script src="blog.js"></script>
</body>
</html>
